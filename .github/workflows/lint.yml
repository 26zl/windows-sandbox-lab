name: Lint

on:
  push:
    paths:
      - "**/*.ps1"
      - "tools.json"
      - "*.wsb.template"
      - ".github/workflows/lint.yml"
      - ".psscriptanalyzer.psd1"
  pull_request:
    paths:
      - "**/*.ps1"
      - "tools.json"
      - "*.wsb.template"
      - ".github/workflows/lint.yml"
      - ".psscriptanalyzer.psd1"

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Get-ChildItem -Path . -Filter *.ps1 -Recurse |
            ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Settings .psscriptanalyzer.psd1 -Severity Warning,Error }

          if ($results) {
            $results | Format-Table -AutoSize
            throw "$($results.Count) issue(s) found."
          }

          Write-Host "No issues found." -ForegroundColor Green

  validate-json:
    name: Validate tools.json
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate tools.json schema
        shell: pwsh
        run: |
          $config = Get-Content tools.json | ConvertFrom-Json
          $errors = @()
          $count = 0

          function Test-ToolGroup($group, $label) {
            $groupErrors = @()
            foreach ($tool in $group) {
              $missing = @()
              if (-not $tool.PSObject.Properties['name']) { $missing += 'name' }
              if (-not $tool.PSObject.Properties['wingetId']) { $missing += 'wingetId' }
              if (-not $tool.PSObject.Properties['enabled']) { $missing += 'enabled' }
              # Non-winget tools must declare source=manual and a url
              if ($tool.PSObject.Properties['wingetId'] -and -not $tool.wingetId) {
                if ($tool.source -ne 'manual') { $missing += 'source=manual (empty wingetId)' }
                if (-not $tool.url) { $missing += 'url (manual tool)' }
              }
              if ($missing.Count -gt 0) {
                $groupErrors += "[$label] Tool '$($tool.name)' missing keys: $($missing -join ', ')"
              }
            }
            return $groupErrors
          }

          if (-not $config.default) { $errors += "Missing 'default' tool array." }
          $errors += Test-ToolGroup $config.default 'default'
          $count += @($config.default).Count

          foreach ($p in $config.profiles.PSObject.Properties) {
            $errors += Test-ToolGroup $p.Value $p.Name
            $count += @($p.Value).Count
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "ERROR: $_" -ForegroundColor Red }
            throw "$($errors.Count) validation error(s) found."
          }
          $profileNames = ($config.profiles.PSObject.Properties.Name -join ', ')
          Write-Host "tools.json is valid ($count tools across default + profiles: $profileNames)." -ForegroundColor Green
